        <script>
            function updateClock() {
                const timeDisplay = document.querySelector('.time');
                const dateDisplay = document.querySelector('.daynmonth');
                const topBarDisplay = document.querySelector('.topbar-datetime');
                const now = new Date();
                
                let hours = now.getHours();
                let minutes = now.getMinutes();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                
                hours = hours % 12;
                hours = hours ? hours : 12;
                minutes = minutes < 10 ? '0' + minutes : minutes;
                
                timeDisplay.textContent = hours + ':' + minutes;

                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                
                const dayName = days[now.getDay()];
                const monthName = months[now.getMonth()];
                const dateNum = now.getDate();
                
                dateDisplay.textContent = dayName + ' ' + monthName + ' ' + dateNum;
                
                topBarDisplay.textContent = dayName + ' ' + monthName + ' ' + dateNum + '  ' + hours + ':' + minutes + ' ' + ampm;
            }

            updateClock();
            setInterval(updateClock, 1000);
            document.getElementById('search-form').addEventListener('submit', function(event) {
    const inputField = this.querySelector('.hello-search');
    const query = inputField.value.trim();

    const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;

    if (urlPattern.test(query)) {
   
        event.preventDefault(); 

        let targetUrl = query;
        if (!/^https?:\/\//i.test(query)) {
            targetUrl = 'https://' + query;
        }

        window.location.href = targetUrl;
    }
});

const NASA_API_URL = 'https://api.nasa.gov/planetary/apod?api_key=WbdHg4rJUmCVwsV9PwWw9ABeSDnXXmIzq30clSRL';

fetch(NASA_API_URL)
    .then(response => {
        if (!response.ok) throw new Error('Network response error');
        return response.json();
    })
    .then(data => {
        const imgElement = document.getElementById('nasa-picture');
        const loadingElement = document.getElementById('nasa-loading');

        if (data.media_type === 'image') {
            imgElement.src = data.url;
        } else if (data.media_type === 'video') {
          
            const videoId = data.url.split('/').pop().split('?')[0];
            imgElement.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
        }

        imgElement.style.display = 'block';
        loadingElement.style.display = 'none';
    })
    .catch(error => {
        console.error('Error fetching NASA data:', error);
        document.getElementById('nasa-loading').innerText = 'Failed to load space data.';
    });
        </script>
